appId: com.lumen.research
productName: Lumen
copyright: Copyright © 2025 Lumen

directories:
  output: release

files:
  - dist-electron/**/*

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
  - from: .next/static
    to: static
    filter:
      - "**/*"
  - from: public
    to: standalone/public
    filter:
      - "**/*"

mac:
  target:
    - dmg
  category: public.app-category.productivity
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist
  icon: build-resources/icon.icns

win:
  target:
    - nsis
  icon: build-resources/icon.png

linux:
  target:
    - AppImage
    - deb
  category: Office
  icon: build-resources

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
