<svg viewBox="0 0 140 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Lumen horizontal lockup: Synthesis Aperture mark + serif wordmark.
    Uses currentColor throughout for universal theme adaptation.
    Wordmark renders with Newsreader when available, falls back to Georgia.
  -->
  <defs>
    <clipPath id="logo-clip-r">
      <circle cx="20" cy="16" r="10.5"/>
    </clipPath>
  </defs>

  <!-- Mark -->
  <circle cx="12" cy="16" r="10.5" stroke="currentColor" stroke-width="1.3" opacity="0.28"/>
  <circle cx="20" cy="16" r="10.5" stroke="currentColor" stroke-width="1.3" opacity="0.28"/>
  <circle cx="12" cy="16" r="10.5" fill="currentColor" opacity="0.07" clip-path="url(#logo-clip-r)"/>
  <path d="M16 5.87A10.5 10.5 0 0 0 16 26.13" stroke="currentColor" stroke-width="1.4" fill="none" opacity="0.55"/>
  <path d="M16 5.87A10.5 10.5 0 0 1 16 26.13" stroke="currentColor" stroke-width="1.4" fill="none" opacity="0.55"/>
  <circle cx="16" cy="16" r="4" stroke="currentColor" stroke-width="0.5" opacity="0.12"/>
  <circle cx="16" cy="16" r="2.2" fill="currentColor" opacity="0.85"/>

  <!-- Wordmark -->
  <text
    x="44"
    y="22"
    font-family="'Newsreader', Georgia, 'Times New Roman', serif"
    font-size="21"
    font-weight="400"
    letter-spacing="-0.5"
    fill="currentColor"
  >Lumen</text>
</svg>
