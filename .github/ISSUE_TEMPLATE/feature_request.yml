name: Feature request
description: Propose a new workflow, capability, or research-oriented improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please anchor requests in a real researcher workflow, not just a generic idea.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user problem first.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should Lumen do?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why does this matter?
      description: Tell us how this improves real research work.
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs or risks
      description: If you see any likely complexity or regressions, call them out.
